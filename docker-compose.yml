version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: gridlock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gridlock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridlock_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gridlock}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gridlock}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gridlock_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gridlock}:${POSTGRES_PASSWORD:-gridlock_secret}@db:5432/${POSTGRES_DB:-gridlock}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gridlock_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
