# ─── GridLock — Configuration SonarCloud ────────────────────────────────────
# US31 : Intégrer SonarQube dans les vérifications du projet
#
# ────────────────────────────────────────────────────────────────────────────

sonar.projectKey=Heidi15_gridLock
sonar.projectName=gridLock
sonar.projectVersion=1.0.0
sonar.organization=heidi15

# ─── Sources ────────────────────────────────────────────────────────────────

sonar.sources=backend/src,frontend/src

sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/prisma/**,\
  **/.github/**

# ─── Tests ──────────────────────────────────────────────────────────────────

sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx
sonar.test.exclusions=**/node_modules/**

# ─── Couverture de tests ─────────────────────────────────────────────────────
# Les fichiers lcov.info sont produits par :
#   - backend : jest --coverage (jest.config.js coverageReporters: ['lcov'])
#   - frontend : vitest --coverage (vite.config.js)

sonar.javascript.lcov.reportPaths=\
  backend/coverage/lcov.info,\
  frontend/coverage/lcov.info

# ─── Langue & encodage ──────────────────────────────────────────────────────

sonar.language=js
sonar.sourceEncoding=UTF-8

# ─── Quality Gate ────────────────────────────────────────────────────────────
# Seuils minimaux retenus pour ce projet étudiant :
#   - Couverture de code  ≥ 70 %
#   - Duplications        ≤ 5 %
#   - Issues bloquantes   = 0
#   - Issues critiques    = 0

# Le quality gate est configuré côté SonarCloud UI (projet > Quality Gates).
# La valeur ci-dessous force l'attente du résultat dans la CI avant de poursuivre.
sonar.qualitygate.wait=true

# ─── Règles ECMAScript ───────────────────────────────────────────────────────

sonar.javascript.environments=node,browser,jest
sonar.nodejs.version=20