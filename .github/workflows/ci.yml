name: CI — GridLock

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend : lint + tests ─────────────────────────────────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: gridlock_test
          POSTGRES_PASSWORD: gridlock_test
          POSTGRES_DB: gridlock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: postgresql://gridlock_test:gridlock_test@localhost:5432/gridlock_test
          JWT_SECRET: test_secret_ci
          JWT_EXPIRES_IN: 1h
          NODE_ENV: test
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─── Frontend : lint + tests ────────────────────────────────────────────
  frontend:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000/api

  # ─── Docker build check ─────────────────────────────────────────────────
  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Build containers
        run: docker compose build --no-cache

      - name: Verify containers start
        run: |
          docker compose up -d db
          sleep 10
          docker compose ps
          docker compose down
